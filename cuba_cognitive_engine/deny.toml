# cargo-deny configuration for cuba-thinking
# Enforces: license whitelist (no GPL/AGPL), advisory auditing, source validation

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

# Advisory auditing — deny all known vulnerabilities
[advisories]
ignore = []

# License enforcement — whitelist only permissive licenses
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true  # Don't check workspace crates (unpublished)
registries = []

# Ban enforcement
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = true
deny = [
    # Abandoned crates
    # { crate = "jsonrpc-core", reason = "Abandoned by ParityTech, migrate to jsonrpsee" },
]
skip = []
skip-tree = []

# Source enforcement — only crates.io allowed
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
